name: Plugin Update Check

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Check for updates
        id: updates
        run: |
          npm outdated || echo "updates_available=true" >> $GITHUB_ENV
          
      - name: Notify if updates found
        if: env.updates_available == 'true'
        run: |
          echo "Updates are available for your OpenCode plugins."
          npm outdated
